[tox]
# Mirror the CI matrix. `tox` runs the test environments; `tox -e lint` and
# `tox -e type` run the static checks. `skip_missing_interpreters` lets a
# developer run `tox` locally without every Python version installed.
envlist = py39, py310, py311, py312, lint, type
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run the test suite with coverage.
extras =
    dev
    hypothesis
    aer
commands =
    pytest {posargs:--cov=qtest --cov-report=term-missing}

[testenv:lint]
description = Check formatting (black) and lint (ruff).
basepython = python3.11
skip_install = true
deps =
    black>=24.0
    ruff>=0.4
commands =
    black --check --diff qtest tests
    ruff check qtest tests

[testenv:type]
description = Type-check with mypy (strict).
basepython = python3.11
extras = dev
commands =
    mypy qtest

[testenv:docs]
description = Build the HTML documentation.
basepython = python3.11
extras = docs
commands =
    sphinx-build -b html docs docs/_build/html
