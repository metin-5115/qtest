# Pre-commit hooks for qtest. Install with:
#   pip install pre-commit && pre-commit install
#
# Formatting (black) and linting (ruff) run here on every commit. Type checking
# (mypy --strict) is intentionally left to CI / `tox -e type`, because it needs
# the project's dependencies installed to resolve imports — awkward in
# pre-commit's isolated hook environments.
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.10.0
    hooks:
      - id: black
