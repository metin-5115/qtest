# ============================================================================
#  qtest — Continuous Integration
#  Runs on every push and pull request: lint, test matrix, and (on main) build.
# ============================================================================

name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]            # tag pushes are handled by release.yml
  pull_request:
    branches: [main]
  workflow_dispatch:                # allow manual runs from the Actions tab

# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default permissions; individual jobs widen them only when needed.
permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  FORCE_COLOR: "1"

jobs:
  # --------------------------------------------------------------------------
  # 1. Lint — black, ruff, mypy. Fast feedback before the full matrix runs.
  # --------------------------------------------------------------------------
  lint:
    name: Lint (black + ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          # Install the package so mypy can resolve qtest.* imports correctly.
          pip install -e ".[dev]"

      - name: Run black (check only, no auto-format)
        run: black --check --diff qtest tests

      - name: Run ruff
        run: ruff check qtest tests

      - name: Run mypy (strict, defined in pyproject.toml)
        run: mypy qtest

  # --------------------------------------------------------------------------
  # 2. Test — matrix across Python versions and operating systems.
  # --------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false               # finish the whole matrix even if one cell fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install qtest with dev + hypothesis + aer extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,hypothesis,aer]"

      - name: Run pytest with coverage
        run: pytest --cov=qtest --cov-report=xml --cov-report=term-missing -ra

      # Codecov is uploaded only once per workflow run, from the canonical
      # ubuntu-latest + Python 3.11 cell, to avoid duplicate reports.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false      # don't fail CI just because Codecov is flaky
          token: ${{ secrets.CODECOV_TOKEN }}   # optional for public repos, required for private

  # --------------------------------------------------------------------------
  # 3. Build — sdist + wheel. Runs on main pushes and on release events.
  #    Acts as a smoke test that the project is publishable; the actual
  #    PyPI upload lives in release.yml.
  # --------------------------------------------------------------------------
  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only build on main pushes or release events — skips PR runs.
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0              # full history so hatch-vcs (future) can derive versions

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions with twine
        run: twine check dist/*

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
