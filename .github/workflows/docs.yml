# ============================================================================
#  qtest — Documentation build check
#  Builds the Sphinx docs on every push / PR so broken docs fail CI before
#  they ever reach Read the Docs (which serves the published site).
# ============================================================================

name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      # Mirrors Read the Docs (.readthedocs.yaml uses fail_on_warning: false):
      # fail the build on hard errors (broken RST, import failures), not on
      # autodoc/myst warnings.
      - name: Build HTML docs
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload built docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          if-no-files-found: error
          retention-days: 14
